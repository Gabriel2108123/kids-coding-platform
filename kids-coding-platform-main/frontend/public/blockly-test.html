<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blockly Test</title>
    <script src="https://unpkg.com/blockly/blockly.min.js"></script>
    <style>
        #blocklyArea {
            width: 100%;
            height: 500px;
            border: 2px solid #ccc;
        }
        #blocklyDiv {
            width: 100%;
            height: 100%;
        }
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        .test-button {
            padding: 10px 20px;
            margin: 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .test-button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <h1>🔍 Blockly Interaction Test</h1>
    <p>This test verifies if Blockly blocks are selectable and draggable.</p>
    
    <button class="test-button" onclick="addTestBlock()">Add Test Block</button>
    <button class="test-button" onclick="clearWorkspace()">Clear Workspace</button>
    <button class="test-button" onclick="testInteraction()">Test Interaction</button>
    
    <div id="blocklyArea">
        <div id="blocklyDiv"></div>
    </div>
    
    <div id="output">
        <h3>Test Results:</h3>
        <div id="results"></div>
    </div>

    <script>
        let workspace;
        
        // Initialize Blockly workspace
        function initBlockly() {
            const toolbox = `
                <xml>
                    <category name="Logic" colour="5B80A5">
                        <block type="controls_if"></block>
                        <block type="logic_compare"></block>
                        <block type="logic_operation"></block>
                        <block type="logic_negate"></block>
                        <block type="logic_boolean"></block>
                    </category>
                    <category name="Loops" colour="5BA55B">
                        <block type="controls_repeat_ext"></block>
                        <block type="controls_whileUntil"></block>
                        <block type="controls_for"></block>
                    </category>
                    <category name="Math" colour="5B67A5">
                        <block type="math_number"></block>
                        <block type="math_arithmetic"></block>
                        <block type="math_single"></block>
                    </category>
                    <category name="Text" colour="5BA58C">
                        <block type="text"></block>
                        <block type="text_join"></block>
                        <block type="text_append"></block>
                    </category>
                    <category name="Variables" colour="A55B99" custom="VARIABLE"></category>
                    <category name="Functions" colour="995BA5" custom="PROCEDURE"></category>
                </xml>
            `;

            workspace = Blockly.inject('blocklyDiv', {
                toolbox: toolbox,
                collapse: true,
                comments: true,
                disable: false,
                maxBlocks: Infinity,
                trashcan: true,
                horizontalLayout: false,
                toolboxPosition: 'start',
                css: true,
                media: 'https://blockly-demo.appspot.com/static/media/',
                rtl: false,
                scrollbars: true,
                sounds: true,
                oneBasedIndex: true,
                readOnly: false,
                move: {
                    scrollbars: {
                        horizontal: true,
                        vertical: true
                    },
                    drag: true,
                    wheel: true
                },
                grid: {
                    spacing: 20,
                    length: 1,
                    colour: '#ccc',
                    snap: true
                },
                zoom: {
                    controls: true,
                    wheel: true,
                    startScale: 1.0,
                    maxScale: 3,
                    minScale: 0.3,
                    scaleSpeed: 1.2
                }
            });

            // Add change listener
            workspace.addChangeListener(function(event) {
                logResult('Workspace changed: ' + event.type);
            });

            // Resize workspace
            setTimeout(() => {
                workspace.resizeContents();
                Blockly.svgResize(workspace);
            }, 100);

            logResult('✅ Blockly workspace initialized successfully!');
        }

        function addTestBlock() {
            const xml = Blockly.utils.xml.textToDom(`
                <block type="math_number" x="50" y="50">
                    <field name="NUM">42</field>
                </block>
            `);
            Blockly.Xml.domToBlock(xml, workspace);
            logResult('🧱 Test block added - try dragging it!');
        }

        function clearWorkspace() {
            workspace.clear();
            logResult('🗑️ Workspace cleared');
        }

        function testInteraction() {
            const blocks = workspace.getAllBlocks();
            if (blocks.length === 0) {
                logResult('⚠️ No blocks to test - add some blocks first');
                return;
            }

            logResult(`📊 Found ${blocks.length} block(s) in workspace`);
            
            // Test if blocks are selectable
            const firstBlock = blocks[0];
            if (firstBlock) {
                firstBlock.select();
                logResult('🎯 First block selected programmatically');
                
                // Test if block can be moved
                const position = firstBlock.getRelativeToSurfaceXY();
                logResult(`📍 Block position: x=${position.x}, y=${position.y}`);
                
                // Try to move the block
                firstBlock.moveBy(10, 10);
                const newPosition = firstBlock.getRelativeToSurfaceXY();
                logResult(`🚀 Block moved to: x=${newPosition.x}, y=${newPosition.y}`);
                
                if (newPosition.x !== position.x || newPosition.y !== position.y) {
                    logResult('✅ Block movement successful!');
                } else {
                    logResult('❌ Block movement failed');
                }
            }
        }

        function logResult(message) {
            const results = document.getElementById('results');
            const timestamp = new Date().toLocaleTimeString();
            results.innerHTML += `<div>[${timestamp}] ${message}</div>`;
            results.scrollTop = results.scrollHeight;
        }

        // Handle window resize
        window.addEventListener('resize', function() {
            workspace.resizeContents();
            Blockly.svgResize(workspace);
        });

        // Initialize when page loads
        window.addEventListener('load', initBlockly);
    </script>
</body>
</html>
