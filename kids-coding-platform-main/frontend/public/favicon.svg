<svg width="32" height="32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bugGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Bug body -->
  <ellipse cx="16" cy="20" rx="8" ry="6" fill="url(#bugGradient)" />
  
  <!-- Bug head -->
  <circle cx="16" cy="12" r="5" fill="url(#bugGradient)" />
  
  <!-- Antennae -->
  <line x1="13" y1="8" x2="11" y2="5" stroke="#4F46E5" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="19" y1="8" x2="21" y2="5" stroke="#4F46E5" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="11" cy="5" r="1" fill="#7C3AED"/>
  <circle cx="21" cy="5" r="1" fill="#7C3AED"/>
  
  <!-- Eyes -->
  <circle cx="14" cy="11" r="1.5" fill="white"/>
  <circle cx="18" cy="11" r="1.5" fill="white"/>
  <circle cx="14" cy="11" r="0.8" fill="black"/>
  <circle cx="18" cy="11" r="0.8" fill="black"/>
  
  <!-- Wings -->
  <ellipse cx="12" cy="16" rx="3" ry="6" fill="#E0E7FF" opacity="0.8" transform="rotate(-20 12 16)"/>
  <ellipse cx="20" cy="16" rx="3" ry="6" fill="#E0E7FF" opacity="0.8" transform="rotate(20 20 16)"/>
  
  <!-- Code symbol on body -->
  <text x="16" y="22" font-family="monospace" font-size="6" text-anchor="middle" fill="white">&lt;/&gt;</text>
</svg>
